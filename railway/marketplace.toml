[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/dotnet-services/Dockerfile.marketplace"
dockerContext = "backend/dotnet-services"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "gcc-dotnet-marketplace"
