worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'req_id=$http_x_request_id rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Security headers
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-Content-Type-Options  nosniff;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m      rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_zone $binary_remote_addr zone=wallet:10m   rate=5r/m;

    # Upstream: Node.js API Gateway
    upstream node_api {
        server node-api:3000;
        keepalive 32;
    }

    # Upstream: .NET Trading service
    upstream dotnet_trading {
        server dotnet-trading:5001;
        keepalive 16;
    }

    # Upstream: .NET Marketplace service
    upstream dotnet_marketplace {
        server dotnet-marketplace:5002;
        keepalive 16;
    }

    # Upstream: .NET Settlement service
    upstream dotnet_settlement {
        server dotnet-settlement:5003;
        keepalive 8;
    }

    # Upstream: .NET Portfolio service
    upstream dotnet_portfolio {
        server dotnet-portfolio:5004;
        keepalive 8;
    }

    # Upstream: .NET AML service
    upstream dotnet_aml {
        server dotnet-aml:5005;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;

        # Health check (no auth)
        location /health {
            proxy_pass http://node_api/health;
            access_log off;
        }

        # ── Node.js routes ────────────────────────────────────────────────────
        location ~ ^/api/v1/(auth|kyc|wallet|notifications|admin) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://node_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_read_timeout 30s;
        }

        # Auth endpoints — stricter rate limit
        location ~ ^/api/v1/auth/(login|register) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://node_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Wallet endpoints — strictest rate limit
        location ~ ^/api/v1/wallet/(deposit|withdraw) {
            limit_req zone=wallet burst=3 nodelay;
            proxy_pass         http://node_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── .NET routes ───────────────────────────────────────────────────────
        location /api/v1/bonds {
            limit_req zone=api burst=50 nodelay;
            proxy_pass         http://dotnet_marketplace;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 15s;
        }

        location /api/v1/orders {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://dotnet_trading;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }

        location /api/v1/settlement {
            proxy_pass         http://dotnet_settlement;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /api/v1/portfolio {
            proxy_pass         http://dotnet_portfolio;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        location /api/v1/aml {
            proxy_pass         http://dotnet_aml;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Hangfire dashboard (Settlement service)
        location /hangfire {
            proxy_pass http://dotnet_settlement;
            proxy_set_header Host $host;
        }

        # 404 fallback
        location / {
            return 404 '{"error":"Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
