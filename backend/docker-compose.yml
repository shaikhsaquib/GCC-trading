version: '3.9'

# =============================================================================
# GCC Bond Trading Platform — Full Stack Docker Compose
# Services: nginx, node-api, dotnet-trading, dotnet-marketplace,
#           dotnet-settlement, dotnet-portfolio, dotnet-aml,
#           postgresql, timescaledb (same PG with extension),
#           redis, mongodb, rabbitmq
# =============================================================================

x-dotnet-common: &dotnet-common
  build:
    context: ./dotnet-services
    dockerfile: Dockerfile.dotnet
  environment:
    - DATABASE_URL=${DATABASE_URL}
    - RABBITMQ_URL=${RABBITMQ_URL}
    - REDIS_URL=${REDIS_URL}
    - JWT_SECRET=${JWT_SECRET}
    - SERVICE_SECRET=${SERVICE_SECRET}
  depends_on:
    postgresql:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - gcc-net
  restart: unless-stopped

services:

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - node-api
      - dotnet-trading
      - dotnet-marketplace
    networks:
      - gcc-net
    restart: unless-stopped

  # ── Node.js API Gateway ─────────────────────────────────────────────────────
  node-api:
    build:
      context: ./node-api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MONGODB_URI=${MONGODB_URI}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - UNIFONIC_API_KEY=${UNIFONIC_API_KEY}
      - UNIFONIC_SENDER_ID=${UNIFONIC_SENDER_ID}
      - FCM_SERVER_KEY=${FCM_SERVER_KEY}
      - ONFIDO_API_KEY=${ONFIDO_API_KEY}
      - HYPERPAY_API_KEY=${HYPERPAY_API_KEY}
      - HYPERPAY_WEBHOOK_SECRET=${HYPERPAY_WEBHOOK_SECRET}
      - DOTNET_TRADING_URL=http://dotnet-trading:5001
      - API_VERSION=v1
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gcc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── .NET Trading Service ────────────────────────────────────────────────────
  dotnet-trading:
    <<: *dotnet-common
    build:
      context: ./dotnet-services
      dockerfile: Dockerfile.trading
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_SECRET=${SERVICE_SECRET}
      - ASPNETCORE_URLS=http://0.0.0.0:5001

  # ── .NET Marketplace Service ────────────────────────────────────────────────
  dotnet-marketplace:
    <<: *dotnet-common
    build:
      context: ./dotnet-services
      dockerfile: Dockerfile.marketplace
    ports:
      - "5002:5002"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ASPNETCORE_URLS=http://0.0.0.0:5002

  # ── .NET Settlement Service ─────────────────────────────────────────────────
  dotnet-settlement:
    <<: *dotnet-common
    build:
      context: ./dotnet-services
      dockerfile: Dockerfile.settlement
    ports:
      - "5003:5003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ASPNETCORE_URLS=http://0.0.0.0:5003

  # ── .NET Portfolio Service ──────────────────────────────────────────────────
  dotnet-portfolio:
    <<: *dotnet-common
    build:
      context: ./dotnet-services
      dockerfile: Dockerfile.portfolio
    ports:
      - "5004:5004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ASPNETCORE_URLS=http://0.0.0.0:5004

  # ── .NET AML Service ────────────────────────────────────────────────────────
  dotnet-aml:
    <<: *dotnet-common
    build:
      context: ./dotnet-services
      dockerfile: Dockerfile.aml
    ports:
      - "5005:5005"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_SECRET=${SERVICE_SECRET}
      - ASPNETCORE_URLS=http://0.0.0.0:5005

  # ── PostgreSQL 16 + TimescaleDB ─────────────────────────────────────────────
  postgresql:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-gccbond}
      - POSTGRES_USER=${POSTGRES_USER:-gccbond}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    networks:
      - gcc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gccbond}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redisdata:/data
    networks:
      - gcc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 7 ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-gccbond}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=gccbond
    volumes:
      - mongodata:/data/db
    networks:
      - gcc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── RabbitMQ 3 ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"    # management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-gccbond}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=gcc-bond
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - gcc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  mongodata:
  rabbitmqdata:

networks:
  gcc-net:
    driver: bridge
